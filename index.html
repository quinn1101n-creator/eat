            const [filterExpanded, setFilterExpanded] = useState(true);
            const [sortConfig, setSortConfig] = useState({ key: 'date', direction: 'desc' });
            const [modalConfig, setModalConfig] = useState({ isOpen: false, actionType: '', rowData: null });

            const handleSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });
            };

            const sortedData = useMemo(() => {
                if (!config || !config.data) return [];
                let items = [...config.data];
                if (sortConfig.key) {
                    items.sort((a, b) => {
                        const aVal = a[sortConfig.key];
                        const bVal = b[sortConfig.key];
                        if (typeof aVal === 'number' && typeof bVal === 'number') {
                            return sortConfig.direction === 'asc' ? aVal - bVal : bVal - aVal;
                        }
                        return sortConfig.direction === 'asc' 
                            ? String(aVal || '').localeCompare(String(bVal || ''))
                            : String(bVal || '').localeCompare(String(aVal || ''));
                    });
                }
                return items;
            }, [config, sortConfig]);

            const handleAction = (type, rowData) => {

                                            <div className="flex items-center justify-end mb-1 space-x-1 w-full"><span className="w-8 text-right">上架:</span><AxureCheckbox /></div>
                                            <div className="flex items-center justify-end mb-1 space-x-1 w-full"><span className="w-8 text-right">新品:</span><AxureCheckbox /></div>
                                            <div className="flex items-center justify-end space-x-1 w-full"><span className="w-8 text-right">推荐:</span><AxureCheckbox /></div>
                                        </td>
                                        <td className="p-3 border-r border-gray-200">{row.sort}</td>
                                        <td className="p-3 border-r border-gray-200"><AxureCheckbox /></td>
                                        <td className="p-3 border-r border-gray-200">{row.sales}</td>
                                        <td className="p-3 border-r border-gray-200"><p className="mb-1">{row.status}</p><p className="text-teal-600 cursor-pointer hover:underline">审核详情</p></td>
                                        <td className="p-3">
                                            <div className="flex flex-col space-y-1 items-center">
                                                <div className="flex space-x-2"><span className="text-teal-600 cursor-pointer hover:underline">查看</span><span className="text-teal-600 cursor-pointer hover:underline">编辑</span></div>
                                                <div className="flex space-x-2"><span className="text-teal-600 cursor-pointer hover:underline">日志</span><span className="text-teal-600 cursor-pointer hover:underline">删除</span></div>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const OrderAddView = () => {
            const [isImporting, setIsImporting] = useState(false);
            const [orderList, setOrderList] = useState([]);

            const handleMockImport = () => {
                setIsImporting(true);
                setTimeout(() => {
                    setOrderList([
                        { id: 'TMP-001', customer: '张三', phone: '13800138000', sku: 'SKU-A001 (智能手机Pro)', qty: 2, amount: 10000.00, status: '校验通过', statusColor: 'text-green-500' },
                        { id: 'TMP-002', customer: '李四', phone: '13900139000', sku: 'SKU-B002 (无线耳机)', qty: 1, amount: 300.00, status: '校验通过', statusColor: 'text-green-500' },
                        { id: 'TMP-003', customer: '王五', phone: '13700137000', sku: 'SKU-X999 (未知商品)', qty: 5, amount: 0.00, status: '库存不足', statusColor: 'text-red-500' }
                    ]);
                    setIsImporting(false);
                }, 800);
            };

            const handleRemove = (id) => setOrderList(orderList.filter(item => item.id !== id));

            return (
                <div className="p-4 bg-[#f0f2f5] min-h-full font-sans text-gray-700">
                    <div className="bg-white border border-gray-200 rounded-sm mb-4 p-4 flex justify-between items-center shadow-sm">
                        <div>
                            <h2 className="text-base font-bold text-gray-800">订单批量导入与添加</h2>
                            <p className="text-xs text-gray-500 mt-1">支持 Excel、CSV 格式文件导入，单次最多处理 5000 条记录。</p>
                        </div>
                        <div className="flex space-x-3">
                            <button className="px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-sm hover:border-[#1890ff] hover:text-[#1890ff] text-sm transition-colors">下载标准模板</button>
                            <button onClick={handleMockImport} className="px-4 py-2 bg-[#1890ff] text-white rounded-sm hover:bg-[#40a9ff] text-sm transition-colors flex items-center">
                                <Icon name="Upload" size={16} className="mr-2" />{isImporting ? '解析中...' : '上传并导入文件'}
                            </button>
                        </div>
                    </div>

                    <div className="bg-white border border-gray-200 rounded-sm shadow-sm flex flex-col h-[calc(100vh-220px)]">
                        <div className="px-4 py-3 border-b border-gray-200 bg-[#fafafa] flex justify-between items-center">
                            <span className="text-sm font-bold text-gray-700">待提交明细 ({orderList.length})</span>
                            <button className="px-4 py-1.5 bg-teal-500 text-white text-sm rounded-sm hover:bg-teal-600 transition-colors">手工追加一行</button>
                        </div>
                        <div className="flex-1 overflow-auto">
                            <table className="w-full text-sm text-center border-collapse">
                                <thead>
                                    <tr className="bg-[#fafafa] text-gray-700 border-b border-gray-200">
                                        <th className="p-3 border-r border-gray-200 font-normal w-16">序号</th>
                                        <th className="p-3 border-r border-gray-200 font-normal">客户姓名</th>
                                        <th className="p-3 border-r border-gray-200 font-normal">手机号</th>
                                        <th className="p-3 border-r border-gray-200 font-normal">SKU明细</th>
                                        <th className="p-3 border-r border-gray-200 font-normal w-24">数量</th>
                                        <th className="p-3 border-r border-gray-200 font-normal">实付金额</th>
                                        <th className="p-3 border-r border-gray-200 font-normal">校验状态</th>
                                        <th className="p-3 font-normal w-16">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {orderList.length === 0 ? (
                                        <tr><td colSpan="8" className="p-10 text-gray-400">暂无数据，请导入文件或手工录入。</td></tr>
                                    ) : orderList.map((row, index) => (
                                        <tr key={row.id} className="border-b border-gray-100 hover:bg-blue-50/50 transition-colors">
                                            <td className="p-3 border-r border-gray-200 text-gray-500">{index + 1}</td>
                                            <td className="p-3 border-r border-gray-200"><input type="text" defaultValue={row.customer} className="w-full text-center outline-none bg-transparent focus:text-[#1890ff]" /></td>
                                            <td className="p-3 border-r border-gray-200"><input type="text" defaultValue={row.phone} className="w-full text-center outline-none bg-transparent focus:text-[#1890ff]" /></td>
                                            <td className="p-3 border-r border-gray-200 text-left px-4">{row.sku}</td>
                                            <td className="p-3 border-r border-gray-200"><input type="number" defaultValue={row.qty} className="w-full text-center outline-none bg-transparent border-b border-gray-300 focus:border-[#1890ff]" /></td>
                                            <td className="p-3 border-r border-gray-200 font-mono text-gray-800">{formatMoney(row.amount)}</td>
                                            <td className={`p-3 border-r border-gray-200 ${row.statusColor}`}>{row.status}</td>
                                            <td className="p-3">
                                                <button onClick={() => handleRemove(row.id)} className="text-gray-400 hover:text-red-500 flex items-center justify-center w-full transition-colors"><Icon name="Trash2" size={14} /></button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                        <div className="p-4 border-t border-gray-200 bg-[#fafafa] flex justify-between items-center">
                            <span className="text-sm text-gray-500">检测到 {orderList.filter(o => o.status !== '校验通过').length} 条异常数据</span>
                            <button className="px-6 py-2 bg-[#1890ff] text-white rounded-sm text-sm hover:bg-[#40a9ff] transition-colors disabled:bg-gray-300 disabled:cursor-not-allowed" disabled={orderList.length === 0}>确认提交</button>
                        </div>
                    </div>
                </div>
            );
        };

        const DetailView = ({ id, onBack }) => (
            <div className="p-4 bg-[#f0f2f5] min-h-full">
                <div className="bg-white border border-gray-200 rounded-sm mb-4 shadow-sm">
                    <div className="px-4 py-3 border-b border-gray-200 flex justify-between items-center bg-[#fafafa]">
                        <span className="text-sm text-gray-700 font-bold">基本信息 <span className="ml-4 font-normal text-gray-500">业务单号: {id}</span></span>
                        <button onClick={onBack} className="text-xs text-[#1890ff] border border-[#1890ff] px-4 py-1.5 rounded-sm hover:bg-blue-50 transition-colors">返回列表</button>
                    </div>
                    <div className="p-5 grid grid-cols-4 gap-y-6 text-sm">
                        <div className="text-gray-500">业务关联方: <span className="text-gray-900 ml-2">核心供应商/客户</span></div>
                        <div className="text-gray-500">结算方式: <span className="text-gray-900 ml-2">对公转账</span></div>
                        <div className="text-gray-500">经办人: <span className="text-gray-900 ml-2">系统管理员</span></div>
                        <div className="text-gray-500">创建时间: <span className="text-gray-900 ml-2">2023-10-01 14:00:00</span></div>
                        <div className="col-span-4 border-t border-gray-100 pt-5 grid grid-cols-4">
                            <div className="text-gray-500">流转状态: <span className="text-blue-600 ml-2 font-medium">节点已完结</span></div>
                            <div className="text-gray-500 col-span-3">最后操作时间: <span className="text-gray-900 ml-2">2023-10-02 10:30:00</span></div>
                        </div>
                    </div>
                </div>

                <div className="bg-white border border-gray-200 rounded-sm shadow-sm">
                    <div className="px-4 py-3 border-b border-gray-200 bg-[#fafafa]">
                        <span className="text-sm text-gray-700 font-bold">业务数据明细</span>
                    </div>
                    <div className="p-4">
                        <table className="w-full text-sm text-center border-collapse border border-gray-200">
                            <thead>
                                <tr className="bg-[#f9f9f9] text-gray-700 border-b border-gray-200">
                                    <th className="p-3 border-r border-gray-200 font-medium">序号</th>
                                    <th className="p-3 border-r border-gray-200 font-medium">标的物/SKU</th>
                                    <th className="p-3 border-r border-gray-200 font-normal">规格属性</th>
                                    <th className="p-3 border-r border-gray-200 font-normal">单价/基准</th>
                                    <th className="p-3 border-r border-gray-200 font-normal">数量</th>
                                    <th className="p-3 font-medium">金额小计</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr className="border-b border-gray-100 hover:bg-blue-50/50 transition-colors">
                                    <td className="p-3 border-r border-gray-200 text-gray-500">1</td>
                                    <td className="p-3 border-r border-gray-200 text-gray-900">SKU-A001 (智能手机Pro)</td>
                                    <td className="p-3 border-r border-gray-200 text-gray-600">钛蓝 256G</td>
                                    <td className="p-3 border-r border-gray-200 text-gray-600">¥ 300.00</td>
                                    <td className="p-3 border-r border-gray-200 text-gray-900">100</td>
                                    <td className="p-3 text-gray-900 font-medium">¥ 30,000.00</td>
                                </tr>
                                <tr className="bg-[#fafafa]">
                                    <td colSpan="5" className="p-3 border-r border-gray-200 text-right font-medium text-gray-600">总计：</td>
                                    <td className="p-3 text-red-600 font-bold font-mono">¥ 30,000.00</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        );

        const Dashboard = () => (
            <div className="p-6 bg-[#f0f2f5] min-h-full">
                <div className="grid grid-cols-4 gap-4 mb-4">
                    <div className="bg-white p-4 border border-gray-200 rounded-sm">
                        <div className="text-gray-500 text-xs mb-2">本月预计总收入</div>
                        <div className="text-xl text-gray-800 mb-1">¥ 1,250,000</div>
                        <div className="text-green-500 text-xs flex items-center"><Icon name="TrendingUp" size={12} className="mr-1" /> 12.5%</div>
                    </div>
                    <div className="bg-white p-4 border border-gray-200 rounded-sm">
                        <div className="text-gray-500 text-xs mb-2">本月待付账款</div>
                        <div className="text-xl text-gray-800 mb-1">¥ 850,000</div>
                        <div className="text-gray-400 text-xs">含采购与物流</div>
                    </div>
                </div>
            </div>
        );

        const App = () => {
            const [currentUser, setCurrentUser] = useState(null);
            
            const visibleMenus = useMemo(() => {
                if (!currentUser) return [];
                const filterMenus = (menus) => menus.reduce((acc, menu) => {
                    if (!menu.roles || menu.roles.includes(currentUser.id)) {
                        const newMenu = { ...menu };
                        if (newMenu.children) newMenu.children = filterMenus(newMenu.children);
                        acc.push(newMenu);
                    }
                    return acc;
                }, []);
                return filterMenus(MENU_DATA);
            }, [currentUser]);

            const [expandedMenus, setExpandedMenus] = useState([]);
            const [activeMenu, setActiveMenu] = useState('');
            const [viewingDetailId, setViewingDetailId] = useState(null);

            useEffect(() => {
                if (currentUser) {
                    setActiveMenu(currentUser.defaultMenu);
                    if (currentUser.id === 'admin') setExpandedMenus(['procurement-root', 'procurement-apply-folder', 'procurement-apply-sub', 'finance-root', 'service-root', 'auth-root']);
                    else if (currentUser.id === 'procurement') setExpandedMenus(['procurement-root', 'procurement-apply-folder', 'procurement-apply-sub']);
                    else if (currentUser.id === 'warehouse') setExpandedMenus(['logistic-root', 'service-root']);
                    else if (currentUser.id === 'finance') setExpandedMenus(['finance-root', 'service-root']);
                }
            }, [currentUser]);

            if (!currentUser) return <LoginScreen onLogin={(user) => setCurrentUser(user)} />;

            const toggleMenu = (id) => setExpandedMenus(prev => prev.includes(id) ? prev.filter(m => m !== id) : [...prev, id]);

            const renderMenu = (items, level = 0) => items.map(item => {
                const hasChildren = item.children && item.children.length > 0;
                const isExpanded = expandedMenus.includes(item.id);
                const isActive = activeMenu === item.id;
                return (
                    <div key={item.id}>
                        <div 
                            className={`flex items-center py-2.5 cursor-pointer text-sm border-l-2
                                ${level === 0 ? 'text-gray-800 font-bold bg-[#fafafa] border-b border-gray-200 border-l-transparent' : 'text-gray-600 border-b border-transparent border-l-transparent'}
                                ${isActive && !hasChildren ? 'text-[#1890ff] bg-blue-50/50 border-l-[#1890ff]' : 'hover:bg-gray-100'}
                            `}
                            style={{ paddingLeft: `${(level * 1.2) + 1}rem` }}
                            onClick={() => {
                                if (hasChildren) toggleMenu(item.id);
                                else { setActiveMenu(item.id); setViewingDetailId(null); }
                            }}
                        >
                            {hasChildren && <span className="mr-1 text-gray-400"><Icon name={isExpanded ? 'ChevronDown' : 'ChevronRight'} size={14}/></span>}
                            {!hasChildren && <span className="w-4 mr-1"></span>}
                            {item.icon && <Icon name={item.icon} size={14} className={`mr-2 ${isActive && !hasChildren ? 'text-[#1890ff]' : 'text-[#a1a7c5]'}`} />}
                            {item.title}
                        </div>
                        {hasChildren && isExpanded && <div>{renderMenu(item.children, level + 1)}</div>}
                    </div>
                );
            });

            return (
                <div className="flex h-screen bg-gray-100 font-sans text-gray-900 overflow-hidden">
                    <aside className="w-[220px] bg-[#f9f9f9] border-r border-gray-200 flex flex-col z-10 overflow-hidden shadow-sm">
                        <div className="h-14 flex items-center px-4 border-b border-gray-200 bg-[#2b333e] text-white shrink-0">
                            <span className="text-sm font-bold tracking-wider">电商业财一体化平台</span>
                        </div>
                        <div className="flex-1 overflow-y-auto bg-[#f5f5f5] pb-10 custom-scrollbar">{renderMenu(visibleMenus)}</div>
                    </aside>
                    <main className="flex-1 flex flex-col min-w-0">
                        <header className="h-14 bg-white border-b border-gray-200 flex items-center justify-between px-4 shrink-0 shadow-sm">
                            <div className="flex items-center text-gray-700 text-sm font-bold">
                                <span className="w-1 h-3 bg-[#1890ff] mr-2 inline-block"></span>
                                {activeMenu === 'commodity-list' ? '商品列表' : activeMenu === 'order-add' ? '添加订单' : activeMenu === 'recon' ? '全盘汇总与月底对账' : activeMenu === 'role-mgr' ? '角色权限配置' : (MODULE_CONFIGS[activeMenu]?.title || '系统面板')}
                            </div>
                            <div className="flex items-center text-sm text-gray-600">
                                <Icon name="User" size={14} className="mr-1" />
                                <span className="mr-4 text-[#1890ff] font-medium">{currentUser.name}</span>
                                <Icon name="LogOut" size={14} className="cursor-pointer hover:text-red-500 transition-colors" onClick={() => setCurrentUser(null)} />
                            </div>
                        </header>
                        {viewingDetailId ? <DetailView id={viewingDetailId} onBack={() => setViewingDetailId(null)} /> : 
                         activeMenu === 'dashboard' ? <Dashboard /> : 
                         activeMenu === 'commodity-list' ? <CommodityListView /> : 
                         activeMenu === 'order-add' ? <OrderAddView /> : 
                         activeMenu === 'recon' ? <ReconSummaryView /> :
                         activeMenu === 'role-mgr' ? <RoleManagerView /> :
                         MODULE_CONFIGS[activeMenu] ? <PageTemplate config={MODULE_CONFIGS[activeMenu]} onViewDetail={setViewingDetailId} /> : 
                         <div className="p-10 text-center text-gray-400">模块开发中</div>}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
